<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SillyTavern RP Music Player</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #10121a;
      color: #f4f6ff;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(122, 166, 255, 0.25), transparent 32rem),
        radial-gradient(circle at bottom right, rgba(255, 112, 188, 0.18), transparent 28rem),
        #10121a;
    }

    main {
      width: min(720px, calc(100% - 32px));
      padding: 40px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 24px;
      background: rgba(22, 25, 36, 0.78);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(18px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 6vw, 4rem);
      line-height: 1;
    }

    p {
      margin: 0 0 24px;
      color: rgba(244, 246, 255, 0.78);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      color: #ffffff;
      text-decoration: none;
      background: rgba(122, 166, 255, 0.22);
      border: 1px solid rgba(122, 166, 255, 0.42);
    }

    a.primary {
      background: #7aa6ff;
      color: #10121a;
      border-color: #7aa6ff;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>RP Music Player</h1>
    <p>
      A third-party SillyTavern extension that adds a floating music widget with queue,
      favorites, playlists, radio, multiple music sources, and RP-aware music suggestions.
    </p>
    <div class="actions">
      <a class="primary" href="https://github.com/scape-glitch/ST-rp-player">GitHub repository</a>
      <a href="https://github.com/scape-glitch/ST-rp-player#readme">Read the README</a>
    </div>
  </main>
</body>
</html>
